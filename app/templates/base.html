<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}MTG Horde Assistant{% endblock %}</title>
    <link rel="stylesheet" href="{{ asset_url(request, 'styles.css') }}" />
    <script defer src="{{ asset_url(request, 'app.js') }}"></script>
  </head>
  <body>
    <header class="site-header">
      <div>
        <a class="brand" href="/">MTG Horde Assistant</a>
        <p class="tagline">A local Horde Magic board-state runner, not a full rules engine.</p>
      </div>
    </header>
    <main class="page-shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
